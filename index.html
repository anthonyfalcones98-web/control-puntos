<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Puntos</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Control de Puntos</h1>

<!-- Login Admin -->
<div id="loginBox">
  <input type="text" id="adminUser" placeholder="Usuario admin">
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="login()">Login Admin</button>
</div>

<div id="errorMsg"></div>

<hr>

<!-- Buscador -->
<div id="searchBox">
  <input type="text" id="search" placeholder="🔍 Buscar nombre...">
</div>
<ul id="suggestions"></ul>

<div id="result"></div>

<!-- Panel Admin -->
<div id="adminPanel" style="display:none;">
  <h3>Panel Administrador</h3>
  <button onclick="addPoint()">➕ Sumar 1 punto</button>
  <button onclick="removePoint()">➖ Quitar 1 punto</button>
  <button onclick="logout()">🚪 Desloguearse</button>
</div>

<script src="app.js"></script>
</body>
</html>
