<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Puntichismes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="topbar">
  <div class="menu">
    <span>☰</span>
    <span>Inicio</span>
    <span>Chismes</span>
    <span>Celebridades</span>
  </div>
  <button id="loginBtn" onclick="toggleLogin()">Iniciar sesión</button>
</div>

<div class="header">
  <img src="header.jpg" alt="Puntichismes">
</div>

<div id="loginBox" class="loginBox">
  <input type="text" id="adminUser" placeholder="Usuario admin">
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <div id="errorMsg"></div>
</div>

<div class="searchContainer">
  <input type="text" id="search" placeholder="🔍 Buscar nombre...">
</div>

<table id="usersTable">
  <thead>
    <tr id="tableHeader">
      <th>Nombre</th>
      <th>Puntos</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<div id="adminPanel" style="display:none;">
  <button onclick="addUserPrompt()">➕ Agregar usuario</button>
  <button onclick="logout()">🚪 Cerrar sesión</button>
</div>

<div class="footer">
  Desarrollado por 
  <strong>Anthony Falcones Alcivar</strong> | 
  <a href="https://instagram.com/anthonovsky27" target="_blank">@anthonovsky27</a>
</div>

<script src="app.js"></script>
</body>
</html>
