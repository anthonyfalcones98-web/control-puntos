<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Puntos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { 
      font-family: system-ui, -apple-system, sans-serif; 
      background: linear-gradient(to bottom right, #a1d4ff, #6ab7ff); /* Celeste claro de tu imagen, un poco más oscuro */
    }
    .card { transition: all 0.3s ease; }
    .card:hover { transform: translateY(-8px); }
    .header-img { 
      max-height: 400px; 
      width: 100%; 
      object-fit: cover; 
      border-radius: 24px; 
      box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.35); 
      border: 4px solid white; 
    }
  </style>
</head>
<body class="min-h-screen py-8">

  <div class="max-w-6xl mx-auto px-6">

    <!-- Header imagen más grande -->
    <div class="flex justify-center mb-12">
      <img src="header.jpeg" alt="Header" class="header-img">
    </div>

    <h1 class="text-6xl font-bold text-center text-white mb-3 drop-shadow-lg">🏆 SISTEMA DE PUNTOS</h1>
    <p class="text-center text-white text-2xl mb-12 drop-shadow-md">Busca y administra los puntos</p>

    <!-- Buscador -->
    <div class="max-w-2xl mx-auto mb-12">
      <input id="searchInput" 
             type="text" 
             placeholder="🔎 Buscar nombre..." 
             class="w-full px-8 py-6 text-2xl rounded-3xl border-2 border-white/40 focus:border-white focus:outline-none shadow-2xl bg-white/30 backdrop-blur-md text-white placeholder-white/70">
    </div>

    <!-- Panel seleccionado -->
    <div id="selectedPanel" class="hidden bg-white/95 backdrop-blur-lg rounded-3xl shadow-2xl p-12 mb-12 text-center border border-white/30">
      <p class="text-gray-700 text-xl">Puntos de</p>
      <h2 id="selectedName" class="text-5xl font-bold text-gray-900 mt-2 mb-8"></h2>
      <div id="selectedPoints" class="text-8xl font-black text-indigo-600 drop-shadow">0</div>
      <p class="text-gray-600 text-xl mt-1">puntos</p>
    </div>

    <!-- Grid de tarjetas -->
    <div id="participantsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>

    <!-- Botón Admin flotante -->
    <button onclick="showLoginModal()" 
            class="fixed bottom-8 right-8 bg-gradient-to-r from-cyan-500 to-blue-600 hover:from-cyan-600 hover:to-blue-700 text-white px-10 py-5 rounded-3xl text-xl font-semibold shadow-2xl flex items-center gap-3 z-50 transition-all">
      <i class="fas fa-user-shield"></i>
      <span>Administrador</span>
    </button>

  </div>

  <!-- Crédito -->
  <div class="fixed bottom-16 left-6 z-40 md:left-8 lg:left-12">
    <a href="https://www.instagram.com/Anthonovsky27" target="_blank" rel="noopener noreferrer"
       class="flex items-center gap-3 text-white hover:text-pink-300 transition-all duration-300 text-lg font-medium bg-black/40 px-5 py-3 rounded-full shadow-md backdrop-blur-sm">
      <i class="fab fa-instagram text-2xl"></i>
      <span>Anthony Falcones Alcívar</span>
    </a>
  </div>

  <!-- Modal Login -->
  <div id="loginModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
    <div class="bg-white/95 backdrop-blur-lg rounded-3xl p-12 w-full max-w-md mx-4 border border-white/20 shadow-2xl">
      <h3 class="text-4xl font-bold text-center mb-10 text-gray-900">🔑 Login Administrador</h3>
      <input id="username" type="text" placeholder="Usuario" class="w-full px-8 py-5 text-2xl border-2 border-gray-300 rounded-3xl mb-6 focus:outline-none focus:border-cyan-500 bg-white/80">
      <input id="password" type="password" placeholder="Contraseña" class="w-full px-8 py-5 text-2xl border-2 border-gray-300 rounded-3xl mb-10 focus:outline-none focus:border-cyan-500 bg-white/80">
      <div class="flex gap-4">
        <button onclick="hideLoginModal()" class="flex-1 py-5 text-xl font-semibold text-gray-600 border-2 border-gray-300 rounded-3xl hover:bg-gray-100">Cancelar</button>
        <button onclick="attemptLogin()" class="flex-1 py-5 text-xl font-semibold bg-gradient-to-r from-cyan-500 to-blue-600 text-white rounded-3xl hover:from-cyan-600 hover:to-blue-700">Entrar</button>
      </div>
    </div>
  </div>

  <!-- Barra Admin -->
  <div id="adminToolbar" class="hidden fixed bottom-8 left-1/2 -translate-x-1/2 bg-gradient-to-r from-cyan-500/90 to-blue-600/90 backdrop-blur-lg shadow-2xl rounded-3xl p-4 flex gap-4 items-center z-[90] flex-wrap justify-center border border-white/20">
    <button onclick="addPoint()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-plus"></i> +1
    </button>
    <button onclick="removePoint()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-minus"></i> -1
    </button>
    <button onclick="deletePerson()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-trash"></i> Eliminar
    </button>
    <button onclick="addNewName()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-user-plus"></i> Nuevo
    </button>
    <button onclick="refreshData()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-sync-alt"></i> Recargar
    </button>
    <span id="saveStatus" class="px-5 py-2 text-sm font-medium rounded-2xl bg-white/30 text-white"></span>
    <button onclick="logout()" class="flex items-center gap-3 bg-white/20 hover:bg-white/30 text-white px-6 py-4 rounded-3xl font-semibold text-xl transition-all">
      <i class="fas fa-sign-out-alt"></i>
    </button>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getDatabase, ref, onValue, set, update, remove } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBjuCA78ZP1W-JyNdaI4IrAVKhFgLGDClo",
      authDomain: "sistema-puntos-app.firebaseapp.com",
      projectId: "sistema-puntos-app",
      storageBucket: "sistema-puntos-app.firebasestorage.app",
      messagingSenderId: "493138426072",
      appId: "1:493138426072:web:0cccb68c1ac0f00a8b3fad",
      measurementId: "G-ZJN30NY6B2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const participantsRef = ref(db, 'participants');

    let data = [];
    let filteredData = [];
    let selectedUser = null;
    let isAdmin = false;

    const ADMIN_USER = "admin";
    const ADMIN_PASS = "admin123";

    onValue(participantsRef, (snapshot) => {
      const dbData = snapshot.val();
      data = dbData ? Object.values(dbData) : [];
      filteredData = [...data];
      renderCards();

      if (selectedUser) {
        const updated = data.find(p => p.name === selectedUser.name);
        if (updated) {
          selectedUser = updated;
          document.getElementById('selectedPoints').textContent = selectedUser.points;
        } else {
          selectedUser = null;
          document.getElementById('selectedPanel').classList.add('hidden');
        }
      }
    });

    function renderCards() {
      const grid = document.getElementById('participantsGrid');
      grid.innerHTML = '';
      filteredData.forEach(person => {
        const isSelected = selectedUser && selectedUser.name === person.name;
        const card = document.createElement('div');
        card.className = `card bg-white/90 backdrop-blur-lg rounded-3xl p-8 shadow-xl cursor-pointer border-4 ${isSelected ? 'border-white' : 'border-transparent'}`;
        card.innerHTML = `
          <div class="text-3xl font-bold text-gray-900 mb-6">${person.name}</div>
          <div class="text-7xl font-black text-indigo-600">${person.points}</div>
          <div class="text-gray-600 mt-1">puntos</div>
        `;
        card.onclick = () => selectUser(person);
        grid.appendChild(card);
      });
    }

    function selectUser(person) {
      selectedUser = person;
      document.getElementById('selectedPanel').classList.remove('hidden');
      document.getElementById('selectedName').textContent = person.name;
      document.getElementById('selectedPoints').textContent = person.points;
      renderCards();
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      const term = e.target.value.toLowerCase().trim();
      filteredData = data.filter(p => p.name.toLowerCase().includes(term));
      renderCards();
    });

    window.showLoginModal = function() {
      document.getElementById('loginModal').classList.remove('hidden');
      document.getElementById('username').focus();
    };

    window.hideLoginModal = function() {
      document.getElementById('loginModal').classList.add('hidden');
    };

    window.attemptLogin = function() {
      const user = document.getElementById('username').value.trim();
      const pass = document.getElementById('password').value.trim();
      if (user === ADMIN_USER && pass === ADMIN_PASS) {
        isAdmin = true;
        hideLoginModal();
        document.getElementById('adminToolbar').classList.remove('hidden');
        showStatus("¡Bienvenido administrador!", "bg-green-100 text-green-700");
      } else {
        alert("pendejo, escribe bien que ese usuario o contraseña no existe.");
        document.getElementById('username').focus();
      }
    };

    window.logout = function() {
      if (confirm("¿Cerrar sesión?")) {
        isAdmin = false;
        document.getElementById('adminToolbar').classList.add('hidden');
      }
    };

    window.showStatus = function(text, colorClass) {
      const status = document.getElementById('saveStatus');
      status.textContent = text;
      status.className = `px-5 py-2 text-sm font-medium rounded-2xl ${colorClass}`;
      setTimeout(() => status.textContent = '', 4000);
    };

    window.addPoint = function() {
      if (!isAdmin || !selectedUser) return;
      const userRef = ref(db, `participants/${selectedUser.name}`);
      update(userRef, { points: selectedUser.points + 1 });
      showStatus("✅ +1 guardado", "bg-green-100 text-green-700");
    };

    window.removePoint = function() {
      if (!isAdmin || !selectedUser) return;
      if (selectedUser.points > 0) {
        const userRef = ref(db, `participants/${selectedUser.name}`);
        update(userRef, { points: selectedUser.points - 1 });
        showStatus("✅ -1 guardado", "bg-green-100 text-green-700");
      }
    };

    window.deletePerson = function() {
      if (!isAdmin || !selectedUser) return alert("Selecciona primero un participante");
      if (confirm(`¿Eliminar permanentemente a ${selectedUser.name}?`)) {
        const userRef = ref(db, `participants/${selectedUser.name}`);
        remove(userRef);
        showStatus("✅ Eliminado", "bg-green-100 text-green-700");
      }
    };

    window.addNewName = function() {
      if (!isAdmin) return;
      const name = prompt("Nombre completo del nuevo participante:");
      if (!name || !name.trim()) return;
      const clean = name.trim();
      if (data.some(p => p.name.toLowerCase() === clean.toLowerCase())) {
        return alert("Ese nombre ya existe");
      }
      const newRef = ref(db, `participants/${clean}`);
      set(newRef, { name: clean, points: 0 });
      showStatus("✅ Nuevo agregado", "bg-green-100 text-green-700");
    };

    window.refreshData = function() {
      showStatus("Datos sincronizados", "bg-blue-100 text-blue-700");
    };

    // Enter para login
    document.addEventListener('DOMContentLoaded', () => {
      const usernameInput = document.getElementById('username');
      const passwordInput = document.getElementById('password');

      usernameInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          passwordInput.focus();
        }
      });

      passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          attemptLogin();
        }
      });
    });
  </script>
</body>
</html>
