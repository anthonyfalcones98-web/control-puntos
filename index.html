<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Control de Puntos Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Control de Puntos</h1>

<!-- Login Admin -->
<div id="loginBox">
  <input type="text" id="adminUser" placeholder="Usuario admin">
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="login()">Login Admin</button>
</div>

<div id="errorMsg"></div>

<hr>

<!-- Buscador -->
<div id="searchBox">
  <input type="text" id="search" placeholder="🔍 Buscar nombre...">
</div>

<table id="usersTable">
  <thead>
    <tr>
      <th>Nombre</th>
      <th>Puntos</th>
      <th>Acciones</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<!-- Admin Panel -->
<div id="adminPanel" style="display:none;">
  <button onclick="addUserPrompt()">➕ Agregar usuario</button>
  <button onclick="logout()">🚪 Desloguearse</button>
</div>

<!-- Créditos -->
<div id="footer">
  Desarrollado por <a href="https://instagram.com/anthonovsky27" target="_blank">Anthony Falcones Alcivar</a>
</div>

<script src="app.js"></script>
</b
