
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puntichismes</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <h1>Puntichismes</h1>
  <button class="login-btn" onclick="toggleLogin()">Iniciar sesión</button>
</div>

<!-- LOGIN PANEL -->
<div id="loginPanel" class="login-panel hidden">
  <input type="text" id="adminUser" placeholder="Usuario admin">
  <input type="password" id="adminPass" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <div id="loginMessage"></div>
</div>

<!-- TABLA DE USUARIOS -->
<div class="table-section">
  <table id="usersTable">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Puntos</th>
      </tr>
    </thead>
    <tbody id="usersBody">
      <!-- Se llenará dinámicamente -->
    </tbody>
  </table>
</div>

<!-- RESULTADO (para selección individual) -->
<div id="resultBox" class="result-box hidden">
  <h2 id="selectedName"></h2>
  <p>Puntos: <span id="selectedPoints"></span></p>
</div>

<!-- PANEL ADMIN -->
<div id="adminPanel" class="admin-panel hidden">
  <h3>Acciones</h3>
  <button onclick="addPoint()">➕ Sumar 1 punto</button>
  <button onclick="removePoint()">➖ Quitar 1 punto</button>
  <button onclick="addUser()">➕ Agregar Ciudadano/a</button>
  <button onclick="deleteUser()">🗑 Eliminar Ciudadano</button>
  <button onclick="logout()">Cerrar sesión</button>
</div>

<!-- FOOTER -->
<div class="footer">
  <div id="myName">Anthony Falcones Alcivar</div>
</div>

<script src="app.js"></script>
</body>
</html>
