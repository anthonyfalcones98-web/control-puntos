<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Anthony</title>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* HEADER */
header{
    background:rgba(0,0,0,0.6);
    padding:20px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
    letter-spacing:1px;
    box-shadow:0 4px 10px rgba(0,0,0,0.5);
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:40px auto;
    padding:20px;
}

/* CARD */
.card{
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
    margin-bottom:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

/* BUTTONS */
button{
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

.btn-primary{
    background:#00c6ff;
    color:black;
}

.btn-danger{
    background:#ff4d4d;
    color:white;
}

/* LOGIN */
#loginBox{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1e2a38;
    padding:30px;
    border-radius:15px;
    width:300px;
    display:none;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:none;
}

#adminPanel{
    display:none;
}

#logoutBtn{
    float:right;
    background:#ff4d4d;
    color:white;
}
</style>
</head>
<body>

<header>
    Anthony Dashboard
    <button id="logoutBtn" style="display:none;" onclick="logout()">Cerrar sesión</button>
</header>

<div class="container">

    <div class="card">
        <h2>Bienvenido</h2>
        <p>Cuenta de Instagram: @anthony_real</p>
        <button class="btn-primary" onclick="openLogin()">Iniciar sesión como Admin</button>
    </div>

    <div id="adminPanel" class="card">
        <h2>Panel de Acciones (Admin)</h2>
        <p>Aquí puedes administrar contenido.</p>
        <button class="btn-danger">Eliminar publicación</button>
    </div>

</div>

<!-- LOGIN BOX -->
<div id="loginBox">
    <h3>Login Admin</h3>
    <input type="text" id="user" placeholder="Usuario">
    <input type="password" id="pass" placeholder="Contraseña">
    <button class="btn-primary" onclick="login()">Entrar</button>
</div>

<script>

/* CREDENCIALES ADMIN */
const ADMIN_USER = "admin";
const ADMIN_PASS = "1234";

/* ABRIR LOGIN */
function openLogin(){
    document.getElementById("loginBox").style.display = "block";
}

/* LOGIN */
function login(){
    let user = document.getElementById("user").value;
    let pass = document.getElementById("pass").value;

    if(user === ADMIN_USER && pass === ADMIN_PASS){
        document.getElementById("loginBox").style.display = "none";
        document.getElementById("adminPanel").style.display = "block";
        document.getElementById("logoutBtn").style.display = "inline-block";
        alert("Bienvenido Admin");
    }else{
        alert("Datos incorrectos");
    }
}

/* LOGOUT */
function logout(){
    document.getElementById("adminPanel").style.display = "none";
    document.getElementById("logoutBtn").style.display = "none";
    alert("Sesión cerrada");
}

</script>

</body>
</html>
